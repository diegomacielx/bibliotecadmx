// Ponte: Adaptando Firebase Compat para as funções que o React espera
window.fb = {
  db: db,
  auth: auth,
  collection: function(db, ...path) { return db.collection(path.join('/')); },
  doc: function(db, ...path) { return db.doc(path.join('/')); },
  onSnapshot: function(ref, ...args) { return ref.onSnapshot(...args); },
  addDoc: function(ref, data) { return ref.add(data); },
  updateDoc: function(ref, data) { return ref.update(data); },
  deleteDoc: function(ref) { return ref.delete(); },
  setDoc: function(ref, data, options) { return ref.set(data, options); },
  getDoc: function(ref) { return ref.get(); },

};

window.app_id = appId;
window.CUSTOM_LOGO_URL = CUSTOM_LOGO_URL;

console.log("Firebase inicializado com sucesso!");

  return typeof __app_id !== 'undefined'
    ? ['artifacts', window.app_id || 'dmx-exercicios-cloud', 'public', 'data', 'exercises']
    : ['exercises'];
};

const getYouTubeId = (url) => {
  if (!url) return null;
  const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=|\/shorts\/)([^#\&\?]*).*/;
  const match = url.match(regExp);
  return (match && match[2].length === 11) ? match[2] : null;
};

const parseCommaList = (value) => {
  if (typeof value === 'string') return value.split(',').map(s => s.trim()).filter(Boolean);
  if (Array.isArray(value)) return value;
  return [];
};

// Normalização de Strings (Remove acentos para busca inteligente)
const normalizeString = (str) => {
  if (!str) return '';
  return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
};

// ==========================================================================
// COMPONENTE EXERCISE CARD (Visual do Exercício - Formato 9:16)
// ==========================================================================
const ExerciseCard = ({ ex, index, isAdmin, isExerciseIncomplete, handleDownloadCheck, showToast, activeDownloadId, setActiveDownloadId, setForm, setEditingId, setAdminTab, setShowAdminPanel, copyLink, copiedId }) => {
  const [isExpanded, setIsExpanded] = useState(false);
  const initialImg = ex.thumbnail || `https://raw.githubusercontent.com/diegomacrielx/dmx/main/${ex.id}.jpg`;
  const [imgSrc, setImgSrc] = useState(initialImg);
  const [imgLoaded, setImgLoaded] = useState(false);
  const fallbackCount = useRef(0);
  const ytId = getYouTubeId(ex.youtubeUrl);

  const handleImageError = () => {
    if (fallbackCount.current >= 6) {
      setImgSrc(window.CUSTOM_LOGO_URL);
      return;
    }
    fallbackCount.current += 1;
    const currentSrc = imgSrc;
    if (currentSrc.includes(`${ex.id}.jpg`) && !ex.thumbnail) {
      setImgSrc(`https://raw.githubusercontent.com/diegomacrielx/dmx/main/${ex.id}.JPG`);
    } else if (currentSrc.includes(`${ex.id}.JPG`) && !ex.thumbnail) {
      setImgSrc(`https://raw.githubusercontent.com/diegomacrielx/dmx/main/${ex.id}.png`);
    } else if (currentSrc.includes(`${ex.id}.png`) && !ex.thumbnail) {
      setImgSrc(`https://raw.githubusercontent.com/diegomacrielx/dmx/main/${ex.id}.PNG`);
    } else if (currentSrc.includes(`${ex.id}.PNG`) || (ex.thumbnail && currentSrc.includes(ex.thumbnail))) {
      setImgSrc(ytId ? `https://img.youtube.com/vi/${ytId}/maxresdefault.jpg` : "https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=400");
    } else if (currentSrc.includes('maxresdefault.jpg')) {
      setImgSrc(`https://img.youtube.com/vi/${ytId}/hqdefault.jpg`);
    } else {
      setImgSrc("https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=400");
    }
  };

  return (
    <div className={`group relative bg-zinc-950 rounded-[2.5rem] border border-white/5 overflow-hidden flex flex-col transition-all hover:border-red-600/50 hover:-translate-y-2 animate-fade-in ${activeDownloadId === ex.firestoreId ? 'z-[50]' : 'z-10'}`} style={{ animationDelay: `${index * 30}ms` }}>
      <div className="aspect-[9/16] bg-zinc-900 relative overflow-hidden">
        {!imgLoaded && (
          <div className="absolute inset-0 bg-zinc-800 animate-pulse z-0 flex items-center justify-center">
            <Icon name="loader" className="w-6 h-6 animate-spin text-zinc-700" />
          </div>

          src={imgSrc}
          loading="lazy"
          onLoad={() => setImgLoaded(true)}
          onError={handleImageError}
          className={`w-full h-full object-cover transition-all duration-700 group-hover:scale-110 relative z-10 ${imgLoaded ? 'opacity-40 group-hover:opacity-100' : 'opacity-0'}`}

        <div className="absolute top-5 left-5 flex flex-col items-start gap-2 z-30">
          <div className="bg-red-600 text-white text-[10px] font-black px-2.5 py-1 rounded-lg uppercase italic border border-white/10 shadow-lg shadow-red-600/30">#{ex.id}</div>
          {isAdmin && isExerciseIncomplete(ex.youtubeUrl) && (
            <div className="bg-amber-500 text-black text-[10px] font-black px-2.5 py-1 rounded-lg uppercase border border-white/10 shadow-lg">INCOMPLETO</div>
          )}
          {isAdmin && ex.hasCloudVideo === false && !isExerciseIncomplete(ex.youtubeUrl) && (
            <div className="bg-red-600 text-white text-[9px] font-black px-2 py-1 rounded-lg uppercase border border-red-500/50 shadow-lg flex items-center gap-1 mt-1">
              <Icon name="x" className="w-3 h-3" /> FALTANDO NUVEM
            </div>
          )}
          {isAdmin && ex.hasCloudVideo === true && !isExerciseIncomplete(ex.youtubeUrl) && (
            <div className="bg-emerald-600 text-white text-[9px] font-black px-2 py-1 rounded-lg uppercase border border-emerald-500/50 shadow-lg flex items-center gap-1 mt-1">
              <Icon name="circlecheck" className="w-3 h-3" /> UPADO (CLOUD)
            </div>
          )}
        </div>
        <div className="absolute top-5 right-5 flex flex-col gap-2 items-end z-[60]">
          <div className="relative">
            <button
              onClick={(e) => {
                e.stopPropagation();
                setActiveDownloadId(activeDownloadId === ex.firestoreId ? null : ex.firestoreId);
              }}
              className="p-3 bg-zinc-900/90 backdrop-blur-md text-white rounded-2xl shadow-xl hover:bg-red-600 transition-all flex items-center justify-center border border-white/5"

            >
              <Icon name="download" className="w-4 h-4" />
            </button>
            {activeDownloadId === ex.firestoreId && (
              <div className="absolute top-full right-0 mt-2 bg-zinc-950 border border-white/10 rounded-2xl shadow-[0_0_30px_rgba(0,0,0,0.8)] flex flex-col overflow-hidden animate-fade-in w-28 origin-top-right z-[9999]">
                <div className="px-3 py-2 bg-white/5 border-b border-white/10 text-[8px] text-zinc-400 font-black uppercase text-center tracking-widest">
                  Qualidade

                  if (quality === '4K') {
                    return (
                      <button
                        key={quality}
                        type="button"
                        onClick={(e) => handleDownloadCheck(e, ex, quality)}

                      >
                        {quality}
                      </button>
                    );
                  } else {
                    return (
                      <button
                        key={quality}

                          e.stopPropagation();

                        className="w-full px-4 py-3 text-[10px] font-black uppercase tracking-widest hover:bg-red-600 text-white transition-colors text-center border-b border-white/5 last:border-0"
                      >
                        {quality}
                      </button>

          {isAdmin && (
            <div className="flex flex-col gap-2 opacity-0 group-hover:opacity-100 transition-all duration-300 translate-x-4 group-hover:translate-x-0">
              <button onClick={(e) => {
                e.stopPropagation();
                setForm({...ex, muscleGroups: Array.isArray(ex.muscleGroups) ? ex.muscleGroups.join(', ') : '', keywords: Array.isArray(ex.keywords) ? ex.keywords.join(', ') : ''});
                setEditingId(ex.firestoreId);

              <button onClick={(e) => {

          <h3

            {ex.name}

          <div className="flex flex-wrap gap-1">

          </div>
        </div>
      </div>
      <div className="p-4 grid grid-cols-4 gap-2 bg-zinc-950 z-30">
        <a href={ex.youtubeUrl} target="_blank" className="col-span-3 bg-white text-black py-4 rounded-2xl flex items-center justify-center gap-2 font-black text-[10px] hover:bg-red-600 hover:text-white transition-all uppercase italic shadow-lg active:scale-95">
          <Icon name="youtube" className="w-4 h-4" /> VÍDEO
        </a>
        <div className="tooltip-container">
          <button onClick={() => copyLink(ex.youtubeUrl, ex.firestoreId)} className={`w-full h-full rounded-2xl flex items-center justify-center border transition-all active:scale-95 ${copiedId === ex.firestoreId ? 'bg-green-600 border-green-500 text-white' : 'bg-zinc-900 border-white/10 text-zinc-500 hover:text-white hover:border-red-600'}`}>
            <Icon name={copiedId === ex.firestoreId ? "check" : "copy"} className="w-5 h-5" />
          </button>
          <span className="tooltip-text">copiar url do vídeo</span>
        </div>
      </div>
    </div>
  );
};

// ==========================================================================
// COMPONENTE APP (Principal)
// ==========================================================================
const App = () => {
  const [isLoggedIn, setIsLoggedIn] = useState(false);
  const [authLoading, setAuthLoading] = useState(true);
  const [loginEmail, setLoginEmail] = useState('');
  const [loginPassword, setLoginPassword] = useState('');
  const [registerPasswordConfirm, setRegisterPasswordConfirm] = useState('');
  const [registerName, setRegisterName] = useState('');
  const [showPassword, setShowPassword] = useState(false);
  const [authMode, setAuthMode] = useState('login');
  const [user, setUser] = useState(null);
  const [userProfile, setUserProfile] = useState(null);
  const [exercises, setExercises] = useState([]);
  const [loading, setLoading] = useState(true);
  const [slowConnection, setSlowConnection] = useState(false);
  const [searchTerm, setSearchTerm] = useState(() => localStorage.getItem('dmx_search') || '');
  const [activeCategory, setActiveCategory] = useState(() => localStorage.getItem('dmx_category') || 'Todos');
  const [copiedId, setCopiedId] = useState(null);
  const [activeDownloadId, setActiveDownloadId] = useState(null);
  const [adminFilter, setAdminFilter] = useState('all');
  const [toast, setToast] = useState({ show: false, msg: '', type: 'success' });
  const toastTimeoutRef = useRef(null);
  const [showAdminPanel, setShowAdminPanel] = useState(false);
  const [isAdmin, setIsAdmin] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [adminTab, setAdminTab] = useState('single');
  const [batchInput, setBatchInput] = useState('');
  const [syncing, setSyncing] = useState(false);
  const [auditProgress, setAuditProgress] = useState(0);
  const [isAuditing, setIsAuditing] = useState(false);
  const [auditStats, setAuditStats] = useState({ checked: 0, found: 0, missing: 0 });
  const [auditCurrentItem, setAuditCurrentItem] = useState('');
  const backgroundAuditRunning = useRef(false);
  const pendingAuditQueue = useRef(new Set());
  const [notifications, setNotifications] = useState([]);
  const [lastReadAt, setLastReadAt] = useState(null);
  const [clearedAt, setClearedAt] = useState(null);
  const [showNotifications, setShowNotifications] = useState(false);
  const [sendNotification, setSendNotification] = useState(true);
  const [sendEmail, setSendEmail] = useState(false);
  const [showRequestModal, setShowRequestModal] = useState(false);
  const [requestForm, setRequestForm] = useState({ name: '', details: '' });
  const [exerciseRequests, setExerciseRequests] = useState([]);
  const [authorizedEmails, setAuthorizedEmails] = useState([]);
  const [newAuthEmail, setNewAuthEmail] = useState('');
  const [appUsers, setAppUsers] = useState([]);
  const [appSettings, setAppSettings] = useState({ webhookUrl: '' });
  const [form, setForm] = useState({ id: '', name: '', category: 'Quadríceps', muscleGroups: '', youtubeUrl: '', thumbnail: '', keywords: '', hasCloudVideo: null });
  const scrollRef = useRef(null);
  const notificationsRef = useRef(null);
  const categories = ['Todos', 'Quadríceps', 'Posteriores', 'Glúteos', 'Adutores', 'Panturrilha', 'Peitoral', 'Costas', 'Ombros', 'Bíceps', 'Tríceps', 'Antebraço', 'Core'];

  const showToast = (msg, type = 'success') => {
    if (toastTimeoutRef.current) clearTimeout(toastTimeoutRef.current);
    setToast({ show: true, msg, type });
    toastTimeoutRef.current = setTimeout(() => {
      setToast({ show: false, msg: '', type: 'success' });
    }, 4000);
  };

  const isExerciseIncomplete = (url) => {
    if (!url) return true;
    const cleanUrl = String(url).trim().toLowerCase();
    return cleanUrl === '' || cleanUrl.includes('revisar_link') || cleanUrl === 'url' || cleanUrl === 'https://url' || cleanUrl.includes('youtube.com/...');
  };

  const openAdminTab = (tab) => {
    setEditingId(null);
    setAdminTab(tab);
    if (tab === 'single') {
      setForm({ id: '', name: '', category: 'Quadríceps', muscleGroups: '', youtubeUrl: '', thumbnail: '', keywords: '', hasCloudVideo: null });
    }
    setShowAdminPanel(true);
  };

  const closeAdminPanel = () => {
    setShowAdminPanel(false);
    setEditingId(null);
    setAdminTab('single');
  };

  const stats = useMemo(() => {
    if (!isAdmin) return null;
    let total = exercises.length;
    let completed = 0;
    let pending = 0;
    let cloudMissing = 0;
    exercises.forEach(ex => {
      if (isExerciseIncomplete(ex.youtubeUrl)) {
        pending++;
      } else {
        completed++;
        if (ex.hasCloudVideo === false) cloudMissing++;
      }
    });
    return { total, completed, pending, cloudMissing };
  }, [exercises, isAdmin]);

  useEffect(() => {
    let timer;
    if (authLoading || loading) {
      timer = setTimeout(() => setSlowConnection(true), 6000);
    } else {
      setSlowConnection(false);
    }
    return () => clearTimeout(timer);
  }, [authLoading, loading]);

  useEffect(() => {
    localStorage.setItem('dmx_search', searchTerm);
  }, [searchTerm]);

  useEffect(() => {
    localStorage.setItem('dmx_category', activeCategory);
  }, [activeCategory]);

  useEffect(() => {
    const handleClickOutside = (event) => {
      if (notificationsRef.current && !notificationsRef.current.contains(event.target)) {
        if (showNotifications) toggleNotifications();
      }
    };
    document.addEventListener("mousedown", handleClickOutside);
    return () => document.removeEventListener("mousedown", handleClickOutside);
  }, [showNotifications]);

  useEffect(() => {
    const handleKeyDown = (e) => {
      if (e.key === 'Escape' && showAdminPanel) {
        closeAdminPanel();
      }
    };
    window.addEventListener('keydown', handleKeyDown);
    return () => window.removeEventListener('keydown', handleKeyDown);
  }, [showAdminPanel]);

  // Autenticação Firebase
  useEffect(() => {
    if (window.fb && window.fb.isValid) {
      const unsubscribe = window.fb.onAuthStateChanged(window.fb.auth, (u) => {
        if (u) {
          setIsLoggedIn(true);
          setUser(u);
          const params = new URLSearchParams(window.location.search);
          const hasAdminParam = params.get('admin') === 'dmx2026';
          setIsAdmin(ADMIN_EMAILS.includes(u.email) && hasAdminParam);
        } else {
          setIsLoggedIn(false);
          setUser(null);
          setUserProfile(null);
          setIsAdmin(false);
        }
        setAuthLoading(false);
      });
      return () => unsubscribe();
    } else {
      setAuthLoading(false);
    }
  }, []);

  // Perfil do usuário
  useEffect(() => {
    if (!isLoggedIn || !window.fb || !user) return;
    const appIdStr = window.app_id || 'dmx-exercicios-cloud';
    const userProfileRef = window.fb.doc(window.fb.db, 'artifacts', appIdStr, 'public', 'data', 'app_users', user.uid);
    const unsubProfile = window.fb.onSnapshot(userProfileRef, async (docSnap) => {
      if (docSnap.exists()) {
        setUserProfile(docSnap.data());
      } else if (!isAdmin) {
        const newProfile = {
          uid: user.uid,
          email: user.email,
          name: user.displayName || 'Aluno DMX',
          status: 'approved',
          createdAt: new Date().toISOString()
        };
        try {
          await window.fb.setDoc(userProfileRef, newProfile);
          setUserProfile(newProfile);
        } catch(e) { console.error("Erro ao migrar usuário", e); }
      }
    });
    return () => unsubProfile();
  }, [isLoggedIn, user, isAdmin]);

  // Exercícios e notificações
  useEffect(() => {
    if (!isLoggedIn || !window.fb || !user) return;
    const path = getDbPath();
    const collectionRef = window.fb.collection(window.fb.db, ...path);
    const unsubExercises = window.fb.onSnapshot(collectionRef, (snap) => {
      const data = snap.docs.map(d => ({ firestoreId: d.id, ...d.data() }));
      data.sort((a, b) => (String(a.id || '')).localeCompare(String(b.id || ''), undefined, {numeric: true}));
      setExercises(data);
      setLoading(false);
    }, (err) => {
      setLoading(false);
    });

    const notifPath = getDbPath().slice(0, -1).concat(['notifications']);
    const notifRef = window.fb.collection(window.fb.db, ...notifPath);
    const unsubNotif = window.fb.onSnapshot(notifRef, (snap) => {
      const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      const myData = data.filter(n => !n.targetUserId || n.targetUserId === user.uid);
      myData.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
      setNotifications(myData);
    });

    const appIdStr = window.app_id || 'dmx-exercicios-cloud';
    const userDocRef = window.fb.doc(window.fb.db, 'artifacts', appIdStr, 'users', user.uid, 'settings', 'notifications');
    const unsubUser = window.fb.onSnapshot(userDocRef, (docSnap) => {
      if (docSnap.exists()) {
        setLastReadAt(docSnap.data().lastReadAt);
        setClearedAt(docSnap.data().clearedAt || null);
      } else {
        const now = new Date().toISOString();
        window.fb.setDoc(userDocRef, { lastReadAt: now, clearedAt: now }, { merge: true });
        setLastReadAt(now);
        setClearedAt(now);
      }
    });

    return () => {
      unsubExercises();
      unsubNotif();
      unsubUser();
    };
  }, [isLoggedIn, user]);

  // Admin: usuários, configurações, pedidos
  useEffect(() => {
    if (!isAdmin || !window.fb) return;
    const appIdStr = window.app_id || 'dmx-exercicios-cloud';
    
    const usersRef = window.fb.collection(window.fb.db, 'artifacts', appIdStr, 'public', 'data', 'app_users');
    const unsubUsers = window.fb.onSnapshot(usersRef, (snap) => {
      const users = snap.docs.map(d => d.data());
      users.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
      setAppUsers(users);
    });

    const settingsRef = window.fb.doc(window.fb.db, 'artifacts', appIdStr, 'public', 'data', 'settings', 'integrations');
    const unsubSettings = window.fb.onSnapshot(settingsRef, (snap) => {
      if (snap.exists()) setAppSettings(snap.data());
    });

    const reqRef = window.fb.collection(window.fb.db, 'artifacts', appIdStr, 'public', 'data', 'exercise_requests');
    const unsubReqs = window.fb.onSnapshot(reqRef, (snap) => {
      const reqs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      reqs.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
      setExerciseRequests(reqs);
    });

    const authRef = window.fb.collection(window.fb.db, 'artifacts', appIdStr, 'public', 'data', 'authorized_emails');
    const unsubAuth = window.fb.onSnapshot(authRef, (snap) => {
      const emails = snap.docs.map(d => d.data());
      emails.sort((a, b) => new Date(b.authorizedAt || '') - new Date(a.authorizedAt || ''));
      setAuthorizedEmails(emails);
    });

    return () => {
      unsubUsers();
      unsubSettings();
      unsubReqs();
      unsubAuth();
    };
  }, [isAdmin]);

  const handleLogin = async (e) => {
    e.preventDefault();
    try {
      await window.fb.signInWithEmailAndPassword(window.fb.auth, loginEmail, loginPassword);
    } catch (error) {
      showToast("E-mail ou senha incorretos.", "error");
    }
  };

  const handleRegister = async (e) => {
    e.preventDefault();
    if (!registerName.trim()) { showToast("Por favor, digite o seu nome completo.", "error"); return; }
    if (loginPassword !== registerPasswordConfirm) { showToast("As senhas não coincidem.", "error"); return; }
    if (loginPassword.length < 6) { showToast("A senha deve ter pelo menos 6 caracteres.", "error"); return; }
    try {
      const emailClean = loginEmail.trim().toLowerCase();
      const appIdStr = window.app_id || 'dmx-exercicios-cloud';
      const authRef = window.fb.doc(window.fb.db, 'artifacts', appIdStr, 'public', 'data', 'authorized_emails', emailClean);
      const authSnap = await window.fb.getDoc(authRef);
      const isPreAuthorized = authSnap.exists();
      const finalStatus = isPreAuthorized ? 'approved' : 'pending';

      const userCredential = await window.fb.createUserWithEmailAndPassword(window.fb.auth, loginEmail, loginPassword);
      await window.fb.updateProfile(userCredential.user, { displayName: registerName });

      const userProfileRef = window.fb.doc(window.fb.db, 'artifacts', appIdStr, 'public', 'data', 'app_users', userCredential.user.uid);
      await window.fb.setDoc(userProfileRef, {
        uid: userCredential.user.uid,
        email: loginEmail,
        name: registerName,
        status: finalStatus,
        createdAt: new Date().toISOString()
      });

      if (isPreAuthorized) {
        showToast("Acesso liberado instantaneamente! Bons treinos.");
      } else {
        showToast("Conta criada com sucesso! Aguarde liberação manual.");
      }
    } catch (error) {
      if (error.code === 'auth/email-already-in-use') showToast("Este e-mail já está cadastrado. Faça login.", "error");
      else showToast("Erro ao criar conta. Tente novamente.", "error");
    }
  };

  const handleResetPassword = async (e) => {
    e.preventDefault();
    if (!loginEmail) {
      showToast("Digite seu e-mail no campo acima para redefinir a senha.", "error");
      return;
    }
    try {
      await window.fb.sendPasswordResetEmail(window.fb.auth, loginEmail);
      showToast("E-mail de recuperação enviado!");
      setAuthMode('login');
    } catch (error) {
      showToast("Erro ao tentar enviar e-mail. Verifique o endereço.", "error");
    }
  };

  const handleLogout = async () => {
    if (confirm("Deseja encerrar sua sessão?")) {
      await window.fb.signOut(window.fb.auth);
      localStorage.removeItem('dmx_search');
      localStorage.removeItem('dmx_category');
      setSearchTerm('');
      setActiveCategory('Todos');
    }
  };

  const pendingUsersCount = appUsers.filter(u => u.status === 'pending').length;
  const pendingRequestsCount = exerciseRequests.filter(r => r.status === 'pending').length;

  const visibleNotifications = useMemo(() => {
    return notifications.filter(n => !clearedAt || n.createdAt > clearedAt);
  }, [notifications, clearedAt]);

  const unreadCount = useMemo(() => {
    if (!lastReadAt) return 0;
    return visibleNotifications.filter(n => n.createdAt > lastReadAt).length;
  }, [visibleNotifications, lastReadAt]);

  const toggleNotifications = async () => {
    const willOpen = !showNotifications;
    setShowNotifications(willOpen);
    if (!willOpen && unreadCount > 0 && user) {
      try {
        const appIdStr = window.app_id || 'dmx-exercicios-cloud';
        const userDocRef = window.fb.doc(window.fb.db, 'artifacts', appIdStr, 'users', user.uid, 'settings', 'notifications');
        await window.fb.setDoc(userDocRef, { lastReadAt: new Date().toISOString() }, { merge: true });
      } catch (e) { console.error("Erro leitura:", e); }
    }
  };

  const clearAllNotifications = async () => {
    if (!user) return;
    try {
      const appIdStr = window.app_id || 'dmx-exercicios-cloud';
      const userDocRef = window.fb.doc(window.fb.db, 'artifacts', appIdStr, 'users', user.uid, 'settings', 'notifications');
      const now = new Date().toISOString();
      await window.fb.setDoc(userDocRef, { clearedAt: now, lastReadAt: now }, { merge: true });
      setShowNotifications(false);
      showToast("Notificações limpas.");
    } catch (e) { console.error("Erro ao limpar:", e); }
  };

  const handleNotificationClick = (exerciseId) => {
    if (!exerciseId) return;
    setActiveCategory('Todos');
    setSearchTerm(exerciseId);
    setShowNotifications(false);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  const toggleUserStatus = async (uid, currentStatus) => {
    const newStatus = currentStatus === 'approved' ? 'blocked' : 'approved';
    try {
      const appIdStr = window.app_id || 'dmx-exercicios-cloud';
      const userRef = window.fb.doc(window.fb.db, 'artifacts', appIdStr, 'public', 'data', 'app_users', uid);
      await window.fb.updateDoc(userRef, { status: newStatus });
      showToast(`Acesso do aluno alterado para: ${newStatus}`);
    } catch(e) { showToast("Erro ao alterar acesso", "error"); }
  };

  const saveSettings = async (e) => {
    e.preventDefault();
    try {
      const appIdStr = window.app_id || 'dmx-exercicios-cloud';
      const settingsRef = window.fb.doc(window.fb.db, 'artifacts', appIdStr, 'public', 'data', 'settings', 'integrations');
      await window.fb.setDoc(settingsRef, appSettings, { merge: true });
      showToast("Configurações do Webhook salvas!");
    } catch(e) { showToast("Erro ao salvar", "error"); }
  };

  const runCloudAudit = async () => {
    const exercisesToAudit = exercises.filter(ex => !isExerciseIncomplete(ex.youtubeUrl));
    if (exercisesToAudit.length === 0) {
      showToast("Não há exercícios preenchidos para auditar.", "error");
      return;
    }
    if (!confirm(`O nosso Robô Invisível já faz isto em segundo plano.\nContudo, pode forçar uma Verificação Imediata Otimizada agora. Deseja iniciar?`)) return;
    setIsAuditing(true);
    setAuditProgress(0);
    let found = 0, missing = 0, checked = 0;
    let batch = window.fb.writeBatch(window.fb.db);
    let batchCount = 0;

    for (let i = 0; i < exercisesToAudit.length; i++) {
      const ex = exercisesToAudit[i];
      setAuditCurrentItem(ex.id);
      let isUpado = false;
      if (ex.id) {
        const gcpApiUrl = `https://storage.googleapis.com/storage/v1/b/biblioteca-dmx-videos-oficiais/o/${ex.id}_4K.mp4`;
        try {
          const response = await fetch(gcpApiUrl, { method: 'GET', cache: 'no-store', headers: { 'Accept': 'application/json' }});
          if (response.ok) isUpado = true;
        } catch (error) {
          if (!navigator.onLine) { showToast("Auditoria interrompida: Falha de rede.", "error"); setIsAuditing(false); return; }
        }
      }
      if (isUpado) found++; else missing++;
      if (ex.hasCloudVideo !== isUpado) {
        const path = getDbPath();
        const docRef = window.fb.doc(window.fb.db, ...path, ex.firestoreId);
        batch.update(docRef, { hasCloudVideo: isUpado });
        batchCount++;
        if (batchCount === 450) { await batch.commit(); batch = window.fb.writeBatch(window.fb.db); batchCount = 0; }
      }
      checked++;
      setAuditStats({ checked, found, missing });
      setAuditProgress(Math.round((checked / exercisesToAudit.length) * 100));
      await new Promise(r => setTimeout(r, 60));
    }
    if (batchCount > 0) await batch.commit();
    setAuditCurrentItem('');
    setIsAuditing(false);
    showToast("Auditoria manual concluída com sucesso!");
  };

  const handleRequestSubmit = async (e) => {
    e.preventDefault();
    if (!user || !requestForm.name.trim()) return;
    try {
      const appIdStr = window.app_id || 'dmx-exercicios-cloud';
      const reqPath = ['artifacts', appIdStr, 'public', 'data', 'exercise_requests'];
      await window.fb.addDoc(window.fb.collection(window.fb.db, ...reqPath), {
        exerciseName: requestForm.name,
        details: requestForm.details,
        userId: user.uid,
        userName: userProfile?.name || user.displayName || 'Aluno',
        userEmail: userProfile?.email || user.email || '',
        status: 'pending',
        createdAt: new Date().toISOString()
      });
      showToast("Sugestão enviada com sucesso! Obrigado.");
      setShowRequestModal(false);
      setRequestForm({ name: '', details: '' });
    } catch (err) { showToast("Erro ao enviar sugestão.", "error"); }
  };

  const markRequestAsDone = async (req) => {
    try {
      const appIdStr = window.app_id || 'dmx-exercicios-cloud';
      const notifPath = ['artifacts', appIdStr, 'public', 'data', 'notifications'];
      await window.fb.addDoc(window.fb.collection(window.fb.db, ...notifPath), {
        title: 'SEU PEDIDO FOI GRAVADO! 🎉',
        message: `O exercício "${req.exerciseName}" que você sugeriu acabou de chegar na biblioteca.`,
        thumbnail: window.CUSTOM_LOGO_URL,
        type: 'request_fulfilled',
        targetUserId: req.userId,
        createdAt: new Date().toISOString()
      });
      if (appSettings && appSettings.webhookUrl) {
        try {
          fetch(appSettings.webhookUrl, {
            method: 'POST',
            body: JSON.stringify({
              event: 'request_fulfilled',
              student_email: req.userEmail,
              student_name: req.userName,
              exercise_name: req.exerciseName
            })
          });
        } catch(e) {}
      }
      const docRef = window.fb.doc(window.fb.db, 'artifacts', appIdStr, 'public', 'data', 'exercise_requests', req.id);
      await window.fb.deleteDoc(docRef);
      showToast("Marcado como gravado e aluno notificado!");
    } catch(e) { showToast("Erro ao processar pedido.", "error"); }
  };

  const handleAddAuthEmail = async (e) => {
    e.preventDefault();
    if (!newAuthEmail.trim()) return;
    const emailClean = newAuthEmail.trim().toLowerCase();
    try {
      const appIdStr = window.app_id || 'dmx-exercicios-cloud';
      const docRef = window.fb.doc(window.fb.db, 'artifacts', appIdStr, 'public', 'data', 'authorized_emails', emailClean);
      await window.fb.setDoc(docRef, {
        email: emailClean,
        source: 'manual_admin',
        authorizedAt: new Date().toISOString()
      });
      setNewAuthEmail('');
      showToast("E-mail pré-autorizado com sucesso!");
    } catch(e) { showToast("Erro ao pré-autorizar e-mail.", "error"); }
  };

  const handleRemoveAuthEmail = async (email) => {
    if (!confirm(`Remover autorização para ${email}?`)) return;
    try {
      const appIdStr = window.app_id || 'dmx-exercicios-cloud';
      const docRef = window.fb.doc(window.fb.db, 'artifacts', appIdStr, 'public', 'data', 'authorized_emails', email);
      await window.fb.deleteDoc(docRef);
      showToast("Autorização revogada.");
    } catch(e) { showToast("Erro ao revogar autorização.", "error"); }
  };

  const scroll = (dir) => {
    if (scrollRef.current) scrollRef.current.scrollBy({ left: dir === 'left' ? -250 : 250, behavior: 'smooth' });
  };

  const handleDownloadCheck = async (e, ex, quality) => {
    e.stopPropagation();
    setActiveDownloadId(null);
    const gcpApiUrl = `https://storage.googleapis.com/storage/v1/b/biblioteca-dmx-videos-oficiais/o/${ex.id}_${quality}.mp4`;
    const mediaUrl = `https://storage.googleapis.com/biblioteca-dmx-videos-oficiais/${ex.id}_${quality}.mp4`;
    showToast(`Verificando disponibilidade de dados...`);
    try {
      const response = await fetch(gcpApiUrl, { method: 'GET', cache: 'no-store', headers: { 'Accept': 'application/json' }});
      if (response.ok) {
        showToast(`Iniciando download seguro...`);
        const noCacheUrl = `${mediaUrl}?t=${new Date().getTime()}`;
        const link = document.createElement('a');
        link.href = noCacheUrl;
        link.setAttribute('download', `${ex.name.replace(/[^a-zA-Z0-9 ]/g, "").replace(/\s+/g, "_")}_${quality}.mp4`);
        link.setAttribute('target', '_blank');
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      } else {
        showToast(`O vídeo "${ex.name}" ainda não está disponível em ${quality}.`, "error");
      }
    } catch (err) {
      if (navigator.onLine) showToast(`O vídeo "${ex.name}" ainda não está disponível em ${quality}.`, "error");
      else showToast(`Falha de conexão à internet.`, "error");
    }
  };

  const filteredExercises = useMemo(() => {
    const validExercises = exercises.filter(ex => {
      if (isAdmin) {
        if (adminFilter === 'completed') return !isExerciseIncomplete(ex.youtubeUrl);
        if (adminFilter === 'incomplete') return isExerciseIncomplete(ex.youtubeUrl);
        if (adminFilter === 'missing_cloud') return !isExerciseIncomplete(ex.youtubeUrl) && ex.hasCloudVideo === false;
        if (adminFilter === 'upados_cloud') return !isExerciseIncomplete(ex.youtubeUrl) && ex.hasCloudVideo === true;
        return true;
      }
      return !isExerciseIncomplete(ex.youtubeUrl);
    });

    if (!searchTerm.trim()) {
      return validExercises.filter(ex => activeCategory === 'Todos' || ex.category === activeCategory);
    }
    const rawSearch = normalizeString(searchTerm);
    const searchParts = rawSearch.split(/[\s+&]+|\band\b/i).filter(Boolean);
    return validExercises.filter(ex => {
      const safeId = normalizeString(String(ex.id || ''));
      const safeName = normalizeString(String(ex.name || ''));
      const keywords = Array.isArray(ex.keywords) ? ex.keywords.map(k => normalizeString(String(k))) : [];
      const muscles = Array.isArray(ex.muscleGroups) ? ex.muscleGroups.map(m => normalizeString(String(m))) : [];
      const matchesSearch = searchParts.every(part => safeId.includes(part) || safeName.includes(part) || keywords.some(k => k.includes(part)) || muscles.some(m => m.includes(part)));
      return (activeCategory === 'Todos' || ex.category === activeCategory) && matchesSearch;
    });
  }, [searchTerm, activeCategory, exercises, isAdmin, adminFilter]);

  const handleSave = async (e) => {
    e.preventDefault();
    if (!user) return;
    let targetId = String(form.id).trim();
    if (!targetId && !editingId) {
      const existingIds = exercises.map(ex => parseInt(ex.id, 10)).filter(id => !isNaN(id));
      existingIds.sort((a, b) => a - b);
      let nextAvailableId = 1;
      for (let i = 0; i < existingIds.length; i++) {
        if (existingIds[i] === nextAvailableId) nextAvailableId++;
        else if (existingIds[i] > nextAvailableId) break;
      }
      targetId = String(nextAvailableId).padStart(4, '0');
    }
    const isDuplicateId = exercises.some(ex => String(ex.id) === targetId && ex.firestoreId !== editingId);
    if (isDuplicateId) { showToast(`Erro: O ID "${targetId}" já está em uso!`, "error"); return; }
    const targetName = String(form.name).trim().toLowerCase();
    const isDuplicateName = exercises.some(ex => String(ex.name).trim().toLowerCase() === targetName && ex.firestoreId !== editingId);
    if (isDuplicateName) { showToast(`Erro: Já existe um exercício com o nome exato "${form.name.trim()}"!`, "error"); return; }
    try {
      const data = { ...form, id: targetId, muscleGroups: parseCommaList(form.muscleGroups), keywords: parseCommaList(form.keywords), updatedAt: new Date().toISOString() };
      if (!editingId) data.hasCloudVideo = null;
      const path = getDbPath();
      let shouldNotify = false;
      const isCompleteNow = !isExerciseIncomplete(data.youtubeUrl);
      if (editingId) {
        const existingEx = exercises.find(ex => ex.firestoreId === editingId);
        const wasIncomplete = existingEx ? isExerciseIncomplete(existingEx.youtubeUrl) : true;
        if (wasIncomplete && isCompleteNow) shouldNotify = true;
      } else {
        if (isCompleteNow) shouldNotify = true;
      }
      if (editingId) {
        await window.fb.updateDoc(window.fb.doc(window.fb.db, ...path, editingId), data);
        showToast("Alterações salvas com sucesso!");
      } else {
        await window.fb.addDoc(window.fb.collection(window.fb.db, ...path), { ...data, createdAt: new Date().toISOString() });
        showToast("Salvo! Pronto para adicionar o próximo.");
      }
      if (shouldNotify) {
        if (sendNotification) {
          let notifThumb = data.thumbnail;
          if (!notifThumb && data.youtubeUrl) {
            const ytId = getYouTubeId(data.youtubeUrl);
            if (ytId) notifThumb = `https://img.youtube.com/vi/${ytId}/hqdefault.jpg`;
          }
          const notifPath = getDbPath().slice(0, -1).concat(['notifications']);
          await window.fb.addDoc(window.fb.collection(window.fb.db, ...notifPath), {
            title: 'NOVO EXERCÍCIO LIBERADO',
            message: `"${data.name}" já está disponível na biblioteca.`,
            thumbnail: notifThumb || '',
            type: 'new_exercise',
            exerciseId: targetId,
            createdAt: new Date().toISOString()
          });
        }
        if (sendEmail && appSettings.webhookUrl) {
          try {
            fetch(appSettings.webhookUrl, {
              method: 'POST',
              body: JSON.stringify({
                event: 'new_exercise_added',
                exercise_name: data.name,
                exercise_id: data.id,
                category: data.category,
                url: data.youtubeUrl
              })
            });
          } catch(e) { console.error("Webhook falhou"); }
        }
      }
      closeAdminPanel();
    } catch (e) { showToast("Erro ao gravar. O servidor negou permissão.", "error"); }
  };

  const handleBatchImport = async () => {
    if (!batchInput.trim()) return;
    setSyncing(true);
    try {
      let dataArray = JSON.parse(batchInput);
      if (!Array.isArray(dataArray)) throw new Error("JSON deve ser um Array");
      const existingNames = exercises.map(ex => String(ex.name).trim().toLowerCase());
      const existingIdsStr = exercises.map(ex => String(ex.id));
      const existingIdsNum = exercises.map(ex => parseInt(ex.id, 10)).filter(id => !isNaN(id));
      const newDataArray = [];
      let skippedCount = 0;
      const namesInCurrentBatch = new Set();
      for (const item of dataArray) {
        const itemName = String(item.name || '').trim().toLowerCase();
        if (!itemName) continue;
        if (existingNames.includes(itemName) || namesInCurrentBatch.has(itemName)) { skippedCount++; continue; }
        namesInCurrentBatch.add(itemName);
        newDataArray.push(item);
      }
      if (newDataArray.length === 0) {
        showToast(`Aviso: Todos os ${skippedCount} exercícios da lista já existem na base!`, "error");
        setSyncing(false);
        return;
      }
      let nextAvailableId = 1;
      const finalDataArray = newDataArray.map(item => {
        let targetId = String(item.id || '').trim();
        if (!targetId || existingIdsStr.includes(targetId)) {
          while (existingIdsNum.includes(nextAvailableId)) nextAvailableId++;
          targetId = String(nextAvailableId).padStart(4, '0');
          existingIdsNum.push(nextAvailableId);
        } else {
          existingIdsNum.push(parseInt(targetId, 10));
          existingIdsStr.push(targetId);
        }
        return { ...item, id: targetId, hasCloudVideo: null };
      });
      const batch = window.fb.writeBatch(window.fb.db);
      const path = getDbPath();
      const collRef = window.fb.collection(window.fb.db, ...path);
      finalDataArray.forEach(item => {
        const docRef = window.fb.doc(collRef);
        batch.set(docRef, { ...item, muscleGroups: parseCommaList(item.muscleGroups), keywords: parseCommaList(item.keywords), createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() });
      });
      await batch.commit();
      closeAdminPanel();
      setBatchInput('');
      showToast(`Lote: ${finalDataArray.length} salvos! ${skippedCount > 0 ? `(${skippedCount} ignorados já existiam)` : ''}`);
    } catch (e) {
      console.error("Batch error:", e);
      showToast("Erro de formato no JSON ou permissão negada.", "error");
    } finally {
      setSyncing(false);
    }
  };

  const copyLink = (url, firestoreId) => {
    try {
      const el = document.createElement('textarea');
      el.value = url;
      document.body.appendChild(el);
      el.select();
      document.execCommand('copy');
      document.body.removeChild(el);
      setCopiedId(firestoreId);
      showToast("URL copiada com sucesso!");
      setTimeout(() => setCopiedId(null), 2000);
    } catch (e) { console.error("Copy error:", e); }
  };

  // ==========================================================================
  // INÍCIO DA RENDERIZAÇÃO (Telas de carregamento, login e validação)
  // ==========================================================================
  if (!window.fb || !window.fb.isValid) return <div className="min-h-screen bg-black flex items-center justify-center p-10 text-center text-red-600 font-bold">CONFIGURAÇÃO DO FIREBASE PENDENTE</div>;
  
  if (authLoading) {
    return (
      <div className="min-h-screen bg-black flex flex-col items-center justify-center relative">
        <Icon name="loader" className="w-12 h-12 animate-spin text-red-600 opacity-50 mb-4" />
        <p className="text-[10px] font-black uppercase tracking-widest text-zinc-500">Conectando ao servidor...</p>
        {slowConnection && (
          <p className="text-[9px] text-red-500 uppercase font-black mt-4 animate-fade-in bg-red-900/20 px-4 py-2 rounded-xl">A conexão parece lenta. Aguarde...</p>
        )}
      </div>
    );
  }

  if (!isLoggedIn) {
    return (
      <div className="min-h-screen bg-black flex items-center justify-center p-6 relative">
        {toast.show && (
          <div className="fixed inset-0 z-[9999] pointer-events-none flex items-center justify-center sm:items-start sm:pt-5">
            <div onClick={() => setToast({ show: false, msg: '', type: 'success' })} title="Clique para fechar" className={`pointer-events-auto cursor-pointer group px-5 py-3 sm:px-6 sm:py-3 rounded-xl sm:rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-2xl animate-fade-in flex items-center justify-between gap-4 max-w-[85vw] text-center border sm:border-none hover:scale-[1.02] active:scale-95 transition-all ${toast.type === 'error' ? 'bg-zinc-900 text-red-500 border-red-900/50 shadow-[0_0_30px_rgba(0,0,0,0.8)]' : 'bg-red-600 text-white border-red-500/50 shadow-[0_0_30px_rgba(220,38,38,0.6)]'}`}>
              <div className="flex items-center justify-center gap-2">
                <Icon name={toast.type === 'error' ? "x" : "circlecheck"} className="w-4 h-4 shrink-0" />
                <span className="text-left">{toast.msg}</span>
              </div>
              <Icon name="x" className="w-3 h-3 opacity-30 group-hover:opacity-100 transition-opacity shrink-0" />
            </div>
          </div>
        )}
        <div className="bg-zinc-950 p-8 sm:p-12 rounded-[3.5rem] border border-white/5 w-full max-w-md text-center shadow-2xl animate-fade-in relative overflow-hidden">
          <img src={window.CUSTOM_LOGO_URL} className="h-20 mx-auto mb-6 drop-shadow-lg relative z-10" alt="DMX Logo" />
          <h2 className="text-xl font-black uppercase italic mb-8 tracking-tighter relative z-10">
            BIBLIOTECA DMX - <span className="text-red-600">{authMode === 'login' ? 'ACESSO RESTRITO' : authMode === 'register' ? 'CRIAR CONTA' : 'RECUPERAR SENHA'}</span>
          </h2>
          <form onSubmit={authMode === 'login' ? handleLogin : authMode === 'register' ? handleRegister : handleResetPassword} className="space-y-4 relative z-10">
            {authMode === 'register' && (
              <div className="text-left space-y-1 relative animate-fade-in mb-4">
                <label className="text-[9px] font-black uppercase text-zinc-600 ml-4 tracking-widest">Nome Completo</label>
                <input required type="text" placeholder="Seu nome e sobrenome" className="w-full p-4 rounded-2xl text-sm" value={registerName} onChange={(e) => setRegisterName(e.target.value)} />
              </div>
            )}
            <div className="text-left space-y-1">
              <label className="text-[9px] font-black uppercase text-zinc-600 ml-4 tracking-widest">E-mail</label>
              <input required type="email" placeholder="Seu e-mail de acesso" className="w-full p-4 rounded-2xl text-sm" value={loginEmail} onChange={(e) => setLoginEmail(e.target.value)} />
            </div>
            {authMode !== 'forgot' && (
              <div className="text-left space-y-1 relative">
                <label className="text-[9px] font-black uppercase text-zinc-600 ml-4 tracking-widest">Senha</label>
                <div className="relative">
                  <input required type={showPassword ? "text" : "password"} placeholder="••••••••" className="w-full p-4 pr-12 rounded-2xl text-sm" value={loginPassword} onChange={(e) => setLoginPassword(e.target.value)} />
                  <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute right-4 top-1/2 -translate-y-1/2 text-zinc-500 hover:text-white transition-colors"><Icon name={showPassword ? "eyeoff" : "eye"} className="w-5 h-5" /></button>
                </div>
              </div>
            )}
            {authMode === 'register' && (
              <div className="text-left space-y-1 relative animate-fade-in">
                <label className="text-[9px] font-black uppercase text-zinc-600 ml-4 tracking-widest">Confirmar Senha</label>
                <input required type={showPassword ? "text" : "password"} placeholder="••••••••" className="w-full p-4 rounded-2xl text-sm" value={registerPasswordConfirm} onChange={(e) => setRegisterPasswordConfirm(e.target.value)} />
              </div>
            )}
            <button type="submit" className="w-full bg-red-600 py-5 rounded-[2rem] font-black uppercase tracking-[0.2em] text-xs hover:bg-red-700 transition-all shadow-xl shadow-red-600/20 active:scale-95 mt-4">
              {authMode === 'login' ? 'ACESSAR A BIBLIOTECA' : authMode === 'register' ? 'CADASTRAR E ACESSAR' : 'ENVIAR LINK DE RECUPERAÇÃO'}
            </button>
          </form>
          <div className="mt-6 flex flex-col gap-3 relative z-10">
            {authMode === 'login' ? (
              <>
                <button onClick={() => {setAuthMode('register'); setLoginPassword(''); setRegisterName('');}} className="text-[10px] text-white hover:text-red-500 transition-colors font-black uppercase tracking-widest bg-white/5 py-3 rounded-xl border border-white/5">
                  Não tem conta? Cadastre-se
                </button>
                <button onClick={() => setAuthMode('forgot')} className="text-[10px] text-zinc-500 hover:text-white transition-colors font-bold uppercase tracking-widest mt-2">
                  Esqueceu sua senha?
                </button>
              </>
            ) : (
              <button onClick={() => {setAuthMode('login'); setLoginPassword(''); setRegisterPasswordConfirm(''); setRegisterName('');}} className="text-[10px] text-zinc-400 hover:text-white transition-colors font-bold uppercase tracking-widest">
                Voltar para o Login
              </button>
            )}
          </div>
          <div className="mt-8 p-4 bg-white/5 rounded-2xl border border-white/5 relative z-10">
            <p className="text-[9px] text-zinc-500 uppercase font-black leading-relaxed tracking-widest">
              Este ambiente é exclusivo para compradores
            </p>
          </div>
        </div>
      </div>
    );
  }

  if (!isAdmin && userProfile && userProfile.status !== 'approved') {
    return (
      <div className="min-h-screen bg-black flex items-center justify-center p-6 relative">
        <div className="bg-zinc-950 p-8 sm:p-12 rounded-[3.5rem] border border-white/5 w-full max-w-md text-center shadow-2xl animate-fade-in relative overflow-hidden">
          <Icon name="loader" className="w-12 h-12 animate-spin text-red-600 opacity-50 mb-6 mx-auto" />
          <h2 className="text-lg font-black uppercase italic mb-4 tracking-tighter text-white">
            ACESSO <span className="text-red-600">EM ANÁLISE</span>
          </h2>
          <p className="text-xs text-zinc-400 leading-relaxed mb-8">
            O seu cadastro foi recebido com sucesso! Estamos verificando a sua matrícula na plataforma. Como este ambiente é exclusivo para alunos, o administrador irá liberar o seu acesso em breve.
          </p>
          <button onClick={handleLogout} className="w-full bg-white/5 py-4 rounded-2xl font-black uppercase tracking-widest text-[10px] text-white hover:bg-white/10 transition-all border border-white/10">
            Sair e Voltar mais tarde
          </button>
        </div>
      </div>
    );
  }

  // DASHBOARD MÍNIMO PARA TESTE
  return (
    <div className="min-h-screen bg-black flex items-center justify-center p-6">
      <div className="bg-zinc-950 p-12 rounded-[3rem] border border-white/5 text-center shadow-2xl">
        <img src={window.CUSTOM_LOGO_URL} className="h-20 mx-auto mb-6" alt="DMX" />
        <h2 className="text-2xl font-black uppercase italic mb-4 text-white">
          BIBLIOTECA <span className="text-red-600">DMX</span>
        </h2>
        <p className="text-zinc-400 mb-6">
          Código funcionando! Aguardando Partes 5 e 6 completas...
        </p>
        <button onClick={handleLogout} className="bg-red-600 text-white px-6 py-3 rounded-xl font-black uppercase text-sm hover:bg-red-700 transition-all">
          Sair
        </button>
      </div>
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
