<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="https://i.imgur.com/rLLYQ3Z.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Biblioteca DMX - Exercícios oficiais com vídeos de execução" />
    <title>Biblioteca DMX - Oficial</title>

    <!-- Capas GitHub — conexão antecipada (prioridade máxima) -->
    <link rel="preconnect" href="https://raw.githubusercontent.com" crossorigin />
    <link rel="dns-prefetch" href="https://raw.githubusercontent.com" />

    <!-- Preconnect tipografia -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />

    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@8..144,100..900&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@8..144,100..900&display=swap"
    />

    <link
      rel="preload"
      as="style"
      href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap"
    />
    <script>
      (function () {
        try {
          var t = localStorage.getItem('dmx_theme');
          var theme = t === 'light' || t === 'dark' ? t : 'dark';
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
        } catch (e) {
          document.documentElement.dataset.theme = 'dark';
          document.documentElement.style.colorScheme = 'dark';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
